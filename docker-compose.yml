services:
  api-gateway:
    build: ./services/api-gateway
    command: >
      sh -c "python /app/scripts/wait_for_db.py &&
             alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    ports:
      - "8000:8000"
    env_file:
      - ./env/.env
    depends_on:
      file-service:
        condition: service_healthy
      extraction-service:
        condition: service_healthy
      prompt-registry:
        condition: service_healthy
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    volumes:
      - ./services/api-gateway/migration:/app/migration
      - ./comp_data:/comp_data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health').read()"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s

  file-service:
    build: ./services/file-service
    ports:
      - "8001:8000"
    env_file:
      - ./env/.env
    volumes:
      - filedata:/data
    depends_on:
      minio-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health').read()"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 15s

  file-service-worker:
    build: ./services/file-service
    command: celery -A app.celery_app worker -l info -Q file_service
    env_file:
      - ./env/.env
    volumes:
      - filedata:/data
    depends_on:
      rabbitmq:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully

  api-gateway-worker:
    build: ./services/api-gateway
    command: celery -A app.celery_app worker -l info -Q api_gateway
    env_file:
      - ./env/.env
    volumes:
      - ./comp_data:/comp_data
    depends_on:
      rabbitmq:
        condition: service_healthy
      postgres:
        condition: service_healthy

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 20s

  prompt-registry:
    build: ./services/prompt-registry
    ports:
      - "8002:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health').read()"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 10s

  extraction-service:
    build: ../extraction
    env_file:
      - ./env/.env
    ports:
      - "8005:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health').read()"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 15s

  domain-analyze:
    build: ./services/domain-analyze
    ports:
      - "8003:8000"
    env_file:
      - ./env/.env
    depends_on:
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health').read()"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 10s

  domain-analyze-worker:
    build: ./services/domain-analyze
    command: celery -A app.celery_app worker -l info -Q domain_analyze
    env_file:
      - ./env/.env
    depends_on:
      rabbitmq:
        condition: service_healthy

  knowledge-base:
    build: ./services/knowledge-base
    ports:
      - "8004:8000"
    env_file:
      - ./env/.env
    volumes:
      - knowledge-base-data:/data
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health').read()"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 10s

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    env_file:
      - ./env/.env
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:9000/minio/health/live >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 15s

  minio-init:
    image: minio/mc
    env_file:
      - ./env/.env
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD; do
        sleep 2;
      done;
      mc mb --ignore-existing local/$$BUCKET_NAME;
      exit 0;
      "

  postgres:
    image: pgvector/pgvector:pg15
    container_name: analyzer-postgres
    env_file:
      - ./env/.env
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 10s

volumes:
  pgdata:
  filedata:
  minio-data:
  knowledge-base-data:
